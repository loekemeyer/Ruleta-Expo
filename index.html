<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta Premium Expo</title>

<style>
  *{box-sizing:border-box}

  :root{
    --bgTop:#303746;
    --bgMid:#1b212d;
    --bgBot:#0c0f15;

    --black1:#1d1d20;
    --black2:#080808;

    --white1:#ffffff;
    --white2:#dddddd;

    --teal1:#27c2c7;
    --teal2:#0c7b80;

    --gold1:#efc76c;
    --gold2:#a96b14;

    --metal1:#5c6169;
    --metal2:#272b32;
    --metal3:#090a0d;
    --metal4:#4d525a;
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at 50% 18%, var(--bgTop) 0%, var(--bgMid) 34%, var(--bgBot) 100%);
    color:#fff;
  }

  .screen{
   width:100vw;
   height:100vh;
 
   display:flex;
   flex-direction:column;
 
   align-items:center;
   justify-content:center;
 
   gap:20px;
   padding:20px;
 }

  .title{
    margin:0;
    font-size:28px;
    line-height:1;
    font-weight:900;
    letter-spacing:.13em;
    text-transform:uppercase;
    text-align:center;
  }

  .subtitle{
    margin:0;
    font-size:14px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:rgba(255,255,255,.68);
  }

  .scene{
   position:relative;
 
   width:min(70vh,900px);
   height:min(70vh,900px);
 
   display:flex;
   align-items:center;
   justify-content:center;
 }

  .platform{
    position:absolute;
    bottom:-4%;
    left:50%;
    transform:translateX(-50%);
    width:96%;
    height:18%;
    border-radius:50%;
    background:
      radial-gradient(circle at 50% 35%, #3d4149 0%, #1a1e25 36%, #090b0f 74%, #1f232a 100%);
    box-shadow:
      0 18px 32px rgba(0,0,0,.40),
      inset 0 0 0 2px rgba(255,255,255,.08),
      inset 0 -10px 18px rgba(0,0,0,.45);
    z-index:1;
  }

  .stand{
    position:absolute;
    bottom:4%;
    left:50%;
    transform:translateX(-50%);
    width:42%;
    height:18%;
    background:linear-gradient(180deg, #252a32 0%, #0d1014 100%);
    clip-path:polygon(12% 100%, 24% 18%, 76% 18%, 88% 100%);
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.30));
    z-index:2;
  }

  .wheel-stage{
    position:relative;
    width:100%;
    height:100%;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .pointer{
    position:absolute;
    top:-1.4%;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:24px solid transparent;
    border-right:24px solid transparent;
    border-top:72px solid #1d1d1f;
    filter:
      drop-shadow(0 6px 10px rgba(0,0,0,.45))
      drop-shadow(0 0 10px rgba(255,255,255,.10));
    z-index:90;
  }

  .pointer{
   position:absolute;
   top:-2.2%;
   left:50%;
   transform:translateX(-50%);
   width:54px;
   height:92px;
   z-index:90;
   filter:
     drop-shadow(0 8px 12px rgba(0,0,0,.45))
     drop-shadow(0 0 10px rgba(255,255,255,.08));
   transform-origin:50% 18%;
 }
 
 .pointer::before{
   content:"";
   position:absolute;
   left:50%;
   top:0;
   transform:translateX(-50%);
   width:54px;
   height:92px;
   background:linear-gradient(180deg, #4a4d52 0%, #1f2125 40%, #0d0e11 100%);
   clip-path:polygon(50% 100%, 100% 0, 0 0);
   border-radius:6px 6px 14px 14px;
   box-shadow:
     inset 0 0 0 2px rgba(255,255,255,.10),
     inset 0 10px 12px rgba(255,255,255,.08),
     inset 0 -8px 10px rgba(0,0,0,.35);
 }
 
 .pointer::after{
   content:"";
   position:absolute;
   left:50%;
   top:14px;
   transform:translateX(-50%);
   width:18px;
   height:18px;
   border-radius:50%;
   background:radial-gradient(circle, #fff 0%, #fff6cf 40%, #d3b676 100%);
   box-shadow:
     0 0 24px rgba(255,240,180,.95),
     0 0 8px rgba(255,255,255,.5);
 }

  .pointer.tick{
    animation:tick 70ms ease-out;
  }
  
  @keyframes tick{
    0%{ transform:translateX(-50%) rotate(0deg); }
    50%{ transform:translateX(-50%) rotate(-9deg); }
    100%{ transform:translateX(-50%) rotate(0deg); }
  }

  .wheel{
    position:relative;
    width:88%;
    height:88%;
    border-radius:50%;
  }

  .outer-rim{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:
      radial-gradient(circle at 50% 45%, var(--metal1) 0%, var(--metal2) 38%, var(--metal3) 68%, var(--metal4) 100%);
    box-shadow:
      0 22px 55px rgba(0,0,0,.45),
      inset 0 0 0 2px rgba(255,255,255,.20),
      inset 0 0 0 12px rgba(0,0,0,.22);
  }

  .outer-rim::before{
    content:"";
    position:absolute;
    inset:1.5%;
    border-radius:50%;
    box-shadow:
      inset 0 1px 2px rgba(255,255,255,.18),
      inset 0 -2px 8px rgba(0,0,0,.35);
  }

  .outer-rim::after{
    content:"";
    position:absolute;
    inset:3.7%;
    border-radius:50%;
    box-shadow:0 0 0 1px rgba(220,190,140,.58);
  }

  .bolts{
    position:absolute;
    inset:1.9%;
    border-radius:50%;
    pointer-events:none;
    z-index:8;
  }

  .bolt{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:
      radial-gradient(circle at 35% 35%, #fff 0%, #ececec 38%, #6e6e6e 100%);
    box-shadow:
      0 0 0 1px rgba(0,0,0,.45),
      0 1px 2px rgba(0,0,0,.5);
    transform:translate(-50%, -50%);
  }

  .wheel-rotator{
    position:absolute;
    inset:5.15%;
    border-radius:50%;
    overflow:hidden;
    will-change:transform;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.10),
      inset 0 0 36px rgba(0,0,0,.16);
  }

  .sector-bg,
  .sector-lines,
  .labels-svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  .sector-lines line{
    stroke:rgba(0,0,0,.48);
    stroke-width:2;
  }

  .labels-svg text{
    font-weight:900;
    text-anchor:middle;
    dominant-baseline:middle;
    paint-order:stroke fill;
  }

  .center-cap{
    position:absolute;
    top:50%;
    left:50%;
    width:25%;
    aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    border-radius:50%;
    z-index:50;
    background:
      radial-gradient(circle at 35% 35%, #7e7e7e 0%, #232323 34%, #070707 68%, #575757 100%);
    box-shadow:
      0 14px 30px rgba(0,0,0,.45),
      inset 0 0 0 2px rgba(255,255,255,.18),
      inset 0 0 22px rgba(255,255,255,.05);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .center-cap::before{
    content:"";
    position:absolute;
    inset:15%;
    border-radius:50%;
    background:
      conic-gradient(
        from 0deg,
        #0a0a0a 0deg,
        #646464 30deg,
        #121212 70deg,
        #8d8d8d 110deg,
        #111 150deg,
        #707070 210deg,
        #0a0a0a 270deg,
        #7d7d7d 320deg,
        #111 360deg
      );
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,.08),
      inset 0 0 20px rgba(255,255,255,.04);
  }

  .center-cap::after{
    content:"";
    position:absolute;
    inset:0;
    margin:auto;
    width:71%;
    height:71%;
    border-radius:50%;
    box-shadow:0 0 0 2px rgba(220,190,140,.88);
  }

  .spin-btn{
    position:absolute;
    inset:0;
    border:none;
    border-radius:50%;
    background:transparent;
    cursor:pointer;
    z-index:60;
  }

  .result{
   min-height:80px;
 
   display:flex;
   align-items:center;
   justify-content:center;
 
   text-align:center;
 
   font-size:64px;
   font-weight:900;
 
   letter-spacing:.03em;
 
   text-shadow:0 6px 18px rgba(0,0,0,.35);
 }

  .controls{
    display:flex;
    gap:14px;
    align-items:center;
    justify-content:center;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:15px 28px;
    font-size:16px;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
    cursor:pointer;
  }

  .btn-spin{
    color:#161616;
    background:linear-gradient(135deg, #f6d07a, #d8a33e 65%, #a66b15);
    box-shadow:0 10px 25px rgba(214,163,62,.24);
  }

  .btn-reset{
    color:#fff;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14);
  }
</style>
</head>
<body>

<div class="screen">
  <h1 class="title">Ruleta de Premios</h1>
  <p class="subtitle">Expo 2026</p>

  <div class="scene">
    <div class="platform"></div>
    <div class="stand"></div>

    <div class="wheel-stage">
      <div id="pointer" class="pointer"></div>

      <div class="wheel">
        <div class="outer-rim"></div>
        <div id="bolts" class="bolts"></div>

        <div id="wheelRotator" class="wheel-rotator">
          <svg id="sectorBg" class="sector-bg" viewBox="0 0 100 100"></svg>
          <svg id="sectorLines" class="sector-lines" viewBox="0 0 100 100"></svg>
          <svg id="labelsSvg" class="labels-svg" viewBox="0 0 100 100"></svg>
        </div>

        <div class="center-cap">
          <button id="spinBtnCenter" class="spin-btn" aria-label="Girar ruleta"></button>
        </div>
      </div>
    </div>
  </div>

  <div id="resultBig" class="result"></div>
</div>

<script>
  const options = [
    "3%","PREMIO 2","8%","PREMIO 4",
    "3%","PREMIO 1","5%","3%",
    "PREMIO 3","PREMIO 2","10%","PREMIO 4",
    "3%","PREMIO 3","5%","3%"
  ];

  const step = 360 / options.length;
  const POINTER_TIP_ANGLE = 270;
  const EPS_DEG = 1e-6;
  const SPIN_DURATION = 5200;

  const wheelRotator = document.getElementById("wheelRotator");
  const sectorBg = document.getElementById("sectorBg");
  const labelsSvg = document.getElementById("labelsSvg");
  const sectorLines = document.getElementById("sectorLines");
  const bolts = document.getElementById("bolts");
  const pointer = document.getElementById("pointer");
  const resultBig = document.getElementById("resultBig");
  const spinBtnCenter = document.getElementById("spinBtnCenter");
  const spinBtnMain = document.getElementById("spinBtnMain");
  const resetBtn = document.getElementById("resetBtn");

  let currentRotation = 0;
  let spinning = false;
  let audioCtx;

  function ensureAudio(){
    audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }

  function playClick(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.value = 1250;
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.18, t + 0.0035);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.032);
  }

  function tickPointer(){
    pointer.classList.remove("tick");
    void pointer.offsetWidth;
    pointer.classList.add("tick");
  }

  function easeOutQuint(x){
    return 1 - Math.pow(1 - x, 5);
  }

  function normalize360(a){
    let x = a % 360;
    if (x < 0) x += 360;
    return x;
  }

  function indexUnderPointer(rotationDeg){
    const worldAngle = normalize360(POINTER_TIP_ANGLE - rotationDeg);
    const a = normalize360(worldAngle + EPS_DEG);
    return Math.floor(a / step);
  }

  function polarPoint(cx, cy, r, angleDeg){
    const rad = angleDeg * Math.PI / 180;
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  function drawBolts(){
    bolts.innerHTML = "";
    const total = 30;
    const cx = 50;
    const cy = 50;
    const r = 48.7;

    for(let i = 0; i < total; i++){
      const ang = (360 / total) * i - 90;
      const p = polarPoint(cx, cy, r, ang);
      const el = document.createElement("div");
      el.className = "bolt";
      el.style.left = p.x + "%";
      el.style.top = p.y + "%";
      bolts.appendChild(el);
    }
  }

  function createDefs(){
    const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");
    defs.innerHTML = `
      <linearGradient id="segBlack" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#202024"/>
        <stop offset="100%" stop-color="#070707"/>
      </linearGradient>

      <linearGradient id="segWhite" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#dddddd"/>
      </linearGradient>

      <linearGradient id="segTeal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#2ac3c8"/>
        <stop offset="100%" stop-color="#0b7b7f"/>
      </linearGradient>

      <linearGradient id="segGold" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#efc76c"/>
        <stop offset="100%" stop-color="#aa6b14"/>
      </linearGradient>
    `;
    return defs;
  }

  function sectorFill(i){
    const palette = ["url(#segBlack)","url(#segWhite)","url(#segTeal)","url(#segGold)"];
    return palette[i % palette.length];
  }

  function drawSectorBackground(){
    sectorBg.innerHTML = "";
    sectorBg.appendChild(createDefs());

    const cx = 50, cy = 50, r = 50;

    for(let i = 0; i < options.length; i++){
      const start = i * step - 90;
      const end = start + step;
      const p1 = polarPoint(cx, cy, r, start);
      const p2 = polarPoint(cx, cy, r, end);

      const path = document.createElementNS("http://www.w3.org/2000/svg","path");
      path.setAttribute(
        "d",
        `M ${cx} ${cy} L ${p1.x.toFixed(4)} ${p1.y.toFixed(4)} A ${r} ${r} 0 0 1 ${p2.x.toFixed(4)} ${p2.y.toFixed(4)} Z`
      );
      path.setAttribute("fill", sectorFill(i));
      sectorBg.appendChild(path);
    }
  }

  function drawSectorLines(){
    sectorLines.innerHTML = "";
    const cx = 50, cy = 50, r = 50;

    for(let i = 0; i < options.length; i++){
      const ang = i * step - 90;
      const p = polarPoint(cx, cy, r, ang);

      const line = document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1", cx);
      line.setAttribute("y1", cy);
      line.setAttribute("x2", p.x.toFixed(3));
      line.setAttribute("y2", p.y.toFixed(3));
      sectorLines.appendChild(line);
    }
  }

  function drawLabels(){
    labelsSvg.innerHTML = "";

    const cx = 50;
    const cy = 50;
    const radius = 35.5;

    options.forEach((txt, i) => {
      const ang = i * step + step / 2 - 90;
      const p = polarPoint(cx, cy, radius, ang);

      const sectorType = i % 4;
      const lightText = sectorType === 0 || sectorType === 2 || sectorType === 3;
      const fill = lightText ? "#ffffff" : "#343434";
      const stroke = lightText ? "rgba(0,0,0,.40)" : "rgba(255,255,255,.14)";

      if (txt.includes("%")) {
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", p.x.toFixed(3));
        t.setAttribute("y", p.y.toFixed(3));
        t.setAttribute("font-size", "7.4");
        t.setAttribute("fill", fill);
        t.setAttribute("stroke", stroke);
        t.setAttribute("stroke-width", "1.2");
        t.style.writingMode = "vertical-rl";
        t.style.glyphOrientationVertical = "0";
        t.setAttribute("transform", `rotate(${ang + 90} ${p.x.toFixed(3)} ${p.y.toFixed(3)})`);
        t.textContent = txt;
        labelsSvg.appendChild(t);
        return;
      }

      const num = txt.replace("PREMIO ","").trim();

      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", p.x.toFixed(3));
      t.setAttribute("y", p.y.toFixed(3));
      t.setAttribute("font-size", "4.2");
      t.setAttribute("fill", "#ffffff");
      t.setAttribute("stroke", "rgba(0,0,0,.34)");
      t.setAttribute("stroke-width", "1");
      t.style.writingMode = "vertical-rl";
      t.style.glyphOrientationVertical = "0";
      t.setAttribute("transform", `rotate(${ang + 90} ${p.x.toFixed(3)} ${p.y.toFixed(3)})`);
      t.textContent = `PREMIO ${num}`;
      labelsSvg.appendChild(t);
    });
  }

  function spin(){
    if(spinning) return;

    spinning = true;
    spinBtnCenter.disabled = true;
    spinBtnMain.disabled = true;
    ensureAudio();
    resultBig.textContent = "";

    const targetIndex = Math.floor(Math.random() * options.length);
    const targetCenter = targetIndex * step + step / 2;
    const extraTurns = 6 + Math.random() * 2;
    const extra = 360 * extraTurns;
    const targetRotation = currentRotation + extra + (POINTER_TIP_ANGLE - targetCenter);

    const start = performance.now();
    const from = currentRotation;
    let lastIdx = indexUnderPointer(from);

    function frame(now){
      const p = Math.min(1, (now - start) / SPIN_DURATION);
      const e = easeOutQuint(p);
      const ang = from + (targetRotation - from) * e;

      wheelRotator.style.transform = `rotate(${ang}deg)`;

      const idx = indexUnderPointer(ang);
      if(idx !== lastIdx){
        lastIdx = idx;
        playClick();
        tickPointer();
      }

      if(p < 1){
        requestAnimationFrame(frame);
      } else {
        currentRotation = targetRotation;
        wheelRotator.style.transform = `rotate(${currentRotation}deg)`;

        const finalIdx = indexUnderPointer(currentRotation);
        const result = options[finalIdx];
        resultBig.textContent = `🎉 ${result}`;

        spinning = false;
        spinBtnCenter.disabled = false;
        spinBtnMain.disabled = false;
      }
    }

    requestAnimationFrame(frame);
  }
  document.body.addEventListener("click", spin);
  function resetWheel(){
    if(spinning) return;
    currentRotation = 0;
    wheelRotator.style.transform = "rotate(0deg)";
    resultBig.textContent = "";
  }

  spinBtnCenter.addEventListener("click", spin);
  spinBtnMain.addEventListener("click", spin);
  resetBtn.addEventListener("click", resetWheel);

  drawBolts();
  drawSectorBackground();
  drawSectorLines();
  drawLabels();
</script>
</body>
</html>
