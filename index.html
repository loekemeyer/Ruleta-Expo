<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta Expo</title>

<style>
  *{box-sizing:border-box}

  :root{
    --bg1:#06070b;
    --bg2:#121520;
    --bg3:#1a1f2e;
    --gold:#f6c453;
    --teal:#0f766e;
    --cream:#fff3dc;
    --dark:#161616;
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at 50% 18%, #2b3145 0%, #161b29 38%, #090b12 100%);
    color:#fff;
  }

  .screen{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:28px 24px;
    overflow:hidden;
  }

  .top-title{
    margin:0;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:.14em;
    font-weight:900;
    line-height:1;
    font-size:30px;
    color:#fff;
    opacity:.96;
    flex:0 0 auto;
  }

  .sub-title{
    margin:0;
    text-align:center;
    font-size:16px;
    font-weight:700;
    color:rgba(255,255,255,.72);
    letter-spacing:.10em;
    text-transform:uppercase;
    flex:0 0 auto;
  }

  .wheel-stage{
    position:relative;
    width:min(86vw, 74vh);
    height:min(86vw, 74vh);
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
  }

  .pointer{
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:34px solid #fff;
    z-index:50;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));
    transform-origin:50% 100%;
  }

  .pointer.tick{
    animation:tick 70ms ease-out;
  }

  @keyframes tick{
    0%{ transform:translateX(-50%) rotate(0deg); }
    50%{ transform:translateX(-50%) rotate(-10deg); }
    100%{ transform:translateX(-50%) rotate(0deg); }
  }

  .wheel{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
  }

  .wheel-rotator{
    position:absolute;
    inset:0;
    border-radius:50%;
    overflow:hidden;
    border:12px solid #0f766e;
    box-shadow:
      0 20px 55px rgba(0,0,0,.45),
      inset 0 0 0 4px rgba(255,255,255,.12),
      inset 0 0 50px rgba(0,0,0,.18);
    will-change:transform;
    background:
      conic-gradient(
        #ef476f 0deg 22.5deg,
        #ffd166 22.5deg 45deg,
        #06d6a0 45deg 67.5deg,
        #118ab2 67.5deg 90deg,
        #8338ec 90deg 112.5deg,
        #fb5607 112.5deg 135deg,
        #ef476f 135deg 157.5deg,
        #ffd166 157.5deg 180deg,
        #06d6a0 180deg 202.5deg,
        #118ab2 202.5deg 225deg,
        #8338ec 225deg 247.5deg,
        #fb5607 247.5deg 270deg,
        #ef476f 270deg 292.5deg,
        #ffd166 292.5deg 315deg,
        #06d6a0 315deg 337.5deg,
        #118ab2 337.5deg 360deg
      );
  }

  .sector-lines,
  .labels-svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  .sector-lines line{
    stroke:rgba(0,0,0,.38);
    stroke-width:3.5;
  }

  .labels-svg text{
    fill:var(--cream);
    stroke:rgba(70,34,12,.78);
    stroke-width:1.8px;
    paint-order:stroke fill;
    font-weight:900;
    letter-spacing:.2px;
  }

  .center-cap{
    position:absolute;
    top:50%;
    left:50%;
    width:28%;
    aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    border-radius:50%;
    z-index:30;
    background:
      radial-gradient(circle at 30% 30%, #ffffff 0%, #f4f4f4 55%, #dcdcdc 100%);
    border:10px solid #0f766e;
    box-shadow:
      0 12px 28px rgba(0,0,0,.35),
      inset 0 0 0 4px rgba(255,255,255,.42);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:12px;
  }

  .center-content{
    color:#111;
    line-height:1;
    text-transform:uppercase;
    user-select:none;
    pointer-events:none;
  }

  .center-small{
    font-size:12px;
    font-weight:800;
    color:#7a7a7a;
    letter-spacing:.08em;
    margin-bottom:.35em;
  }

  .center-main{
    font-size:30px;
    font-weight:900;
    color:#0f766e;
    letter-spacing:.04em;
  }

  .center-bottom{
    margin-top:.45em;
    display:inline-block;
    background:linear-gradient(135deg, #f6c453, #e7a91d);
    color:#fff;
    padding:.42em .9em;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    letter-spacing:.08em;
  }

  .spin-btn{
    position:absolute;
    inset:0;
    border:none;
    border-radius:50%;
    background:transparent;
    cursor:pointer;
    z-index:35;
  }

  .result-box{
    min-height:88px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    flex:0 0 auto;
  }

  .result-label{
    margin:0;
    font-size:16px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:rgba(255,255,255,.6);
    font-weight:800;
  }

  .result-big{
    margin:0;
    min-height:1.2em;
    font-size:48px;
    line-height:1.05;
    font-weight:900;
    text-align:center;
    text-shadow:0 6px 18px rgba(0,0,0,.35);
    padding:0 10px;
  }

  .cta{
    display:flex;
    gap:16px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    flex:0 0 auto;
  }

  .btn{
    border:none;
    cursor:pointer;
    border-radius:999px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.08em;
    transition:transform .15s ease;
    white-space:nowrap;
  }

  .btn:hover{ transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }

  .btn-spin{
    background:linear-gradient(135deg, #ffd166, #e9a91d);
    color:#171717;
    padding:16px 34px;
    font-size:18px;
    box-shadow:0 10px 24px rgba(233,169,29,.22);
  }

  .btn-reset{
    background:rgba(255,255,255,.08);
    color:#fff;
    border:1px solid rgba(255,255,255,.12);
    padding:15px 28px;
    font-size:16px;
  }
</style>
</head>
<body>

<div class="screen">
  <h1 class="top-title">Ruleta de Premios</h1>
  <p class="sub-title">Expo 2026</p>

  <div class="wheel-stage">
    <div id="pointer" class="pointer"></div>

    <div class="wheel">
      <div id="wheelRotator" class="wheel-rotator">
        <svg id="sectorLines" class="sector-lines" viewBox="0 0 100 100" aria-hidden="true"></svg>
        <svg id="labelsSvg" class="labels-svg" viewBox="0 0 100 100" aria-hidden="true"></svg>
      </div>

      <div class="center-cap">
        <div class="center-content">
          <div class="center-small">Probá</div>
          <div class="center-main">Suerte</div>
          <div class="center-bottom">Girar</div>
        </div>
        <button id="spinBtnCenter" class="spin-btn" aria-label="Girar ruleta"></button>
      </div>
    </div>
  </div>

  <div class="result-box">
    <p class="result-label">Resultado</p>
    <p id="resultBig" class="result-big"></p>
  </div>

  <div class="cta">
    <button id="spinBtnMain" class="btn btn-spin">Girar ruleta</button>
    <button id="resetBtn" class="btn btn-reset">Reset</button>
  </div>
</div>

<script>
  const options = [
    "3%","PREMIO 2","8%","PREMIO 4",
    "3%","PREMIO 1","5%","3%",
    "PREMIO 3","PREMIO 2","10%","PREMIO 4",
    "3%","PREMIO 3","5%","3%"
  ];

  const step = 360 / options.length;
  const POINTER_TIP_ANGLE = 270;
  const EPS_DEG = 1e-6;
  const SPIN_DURATION = 5200;

  const wheelRotator = document.getElementById("wheelRotator");
  const labelsSvg = document.getElementById("labelsSvg");
  const sectorLines = document.getElementById("sectorLines");
  const pointer = document.getElementById("pointer");
  const resultBig = document.getElementById("resultBig");
  const spinBtnCenter = document.getElementById("spinBtnCenter");
  const spinBtnMain = document.getElementById("spinBtnMain");
  const resetBtn = document.getElementById("resetBtn");

  let currentRotation = 0;
  let spinning = false;

  let audioCtx;
  function ensureAudio(){
    audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }

  function playClick(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 1400;

    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.18, t + 0.004);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.028);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.03);
  }

  function tickPointer(){
    pointer.classList.remove("tick");
    void pointer.offsetWidth;
    pointer.classList.add("tick");
  }

  function easeOutQuint(x){
    return 1 - Math.pow(1 - x, 5);
  }

  function polarPoint(cx, cy, r, angleDeg){
    const rad = angleDeg * Math.PI / 180;
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  function drawSectorLines(){
    sectorLines.innerHTML = "";
    const cx = 50, cy = 50, r = 50;

    for(let i = 0; i < options.length; i++){
      const ang = i * step;
      const p = polarPoint(cx, cy, r, ang);

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", cx);
      line.setAttribute("y1", cy);
      line.setAttribute("x2", p.x.toFixed(3));
      line.setAttribute("y2", p.y.toFixed(3));
      sectorLines.appendChild(line);
    }
  }

  function drawLabels(){
   labelsSvg.innerHTML = "";
 
   const cx = 50;
   const cy = 50;
   const radius = 41.5;
 
   options.forEach((txt, i) => {
     const ang = i * step + step / 2;
     const p = polarPoint(cx, cy, radius, ang);
 
     const isPercent = txt.includes("%");
     const isPremio = txt.startsWith("PREMIO");
 
     if (isPercent) {
       const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
       t.setAttribute("x", p.x.toFixed(3));
       t.setAttribute("y", p.y.toFixed(3));
       t.setAttribute("text-anchor", "middle");
       t.setAttribute("dominant-baseline", "middle");
       t.setAttribute("font-size", "7.4");
       t.style.writingMode = "vertical-rl";
       t.style.glyphOrientationVertical = "0";
       t.setAttribute(
         "transform",
         `rotate(${ang + 90} ${p.x.toFixed(3)} ${p.y.toFixed(3)})`
       );
       t.textContent = txt;
       labelsSvg.appendChild(t);
       return;
     }
 
     if (isPremio) {
       const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
       g.setAttribute(
         "transform",
         `rotate(${ang + 90} ${p.x.toFixed(3)} ${p.y.toFixed(3)})`
       );
 
       const line1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
       line1.setAttribute("x", p.x.toFixed(3));
       line1.setAttribute("y", (p.y - 3.6).toFixed(3));
       line1.setAttribute("text-anchor", "middle");
       line1.setAttribute("dominant-baseline", "middle");
       line1.setAttribute("font-size", "4.2");
       line1.textContent = "PREMIO";
 
       const num = txt.replace("PREMIO ", "").trim();
 
       const line2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
       line2.setAttribute("x", p.x.toFixed(3));
       line2.setAttribute("y", (p.y + 3.8).toFixed(3));
       line2.setAttribute("text-anchor", "middle");
       line2.setAttribute("dominant-baseline", "middle");
       line2.setAttribute("font-size", "6.2");
       line2.textContent = num;
 
       g.appendChild(line1);
       g.appendChild(line2);
       labelsSvg.appendChild(g);
     }
   });
 }

  function normalize360(a){
    let x = a % 360;
    if(x < 0) x += 360;
    return x;
  }

  function indexUnderPointer(rotationDeg){
    const worldAngle = normalize360(POINTER_TIP_ANGLE - rotationDeg);
    const a = normalize360(worldAngle + EPS_DEG);
    return Math.floor(a / step);
  }

  function spin(){
    if(spinning) return;

    spinning = true;
    spinBtnCenter.disabled = true;
    spinBtnMain.disabled = true;
    ensureAudio();
    resultBig.textContent = "";

    const targetIndex = Math.floor(Math.random() * options.length);
    const targetCenter = targetIndex * step + step / 2;
    const extraTurns = 6 + Math.random() * 2;
    const extra = 360 * extraTurns;
    const targetRotation = currentRotation + extra + (POINTER_TIP_ANGLE - targetCenter);

    const start = performance.now();
    const from = currentRotation;
    let lastIdx = indexUnderPointer(from);

    function frame(now){
      const p = Math.min(1, (now - start) / SPIN_DURATION);
      const e = easeOutQuint(p);
      const ang = from + (targetRotation - from) * e;

      wheelRotator.style.transform = `rotate(${ang}deg)`;

      const idx = indexUnderPointer(ang);
      if(idx !== lastIdx){
        lastIdx = idx;
        playClick();
        tickPointer();
      }

      if(p < 1){
        requestAnimationFrame(frame);
      } else {
        currentRotation = targetRotation;
        wheelRotator.style.transform = `rotate(${currentRotation}deg)`;

        const finalIdx = indexUnderPointer(currentRotation);
        const result = options[finalIdx];

        resultBig.textContent = `🎉 ${result}`;

        spinning = false;
        spinBtnCenter.disabled = false;
        spinBtnMain.disabled = false;
      }
    }

    requestAnimationFrame(frame);
  }

  function resetWheel(){
    if(spinning) return;
    currentRotation = 0;
    wheelRotator.style.transform = "rotate(0deg)";
    resultBig.textContent = "";
  }

  spinBtnCenter.addEventListener("click", spin);
  spinBtnMain.addEventListener("click", spin);
  resetBtn.addEventListener("click", resetWheel);

  drawSectorLines();
  drawLabels();
</script>
</body>
</html>
