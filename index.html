<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta Premium Expo</title>

<style>
  *{box-sizing:border-box}

  :root{
    --bg:#0f1116;
    --panel:#171a21;
    --metal1:#f5f5f5;
    --metal2:#d9d9d9;
    --metal3:#8d8d8d;
    --black:#121212;
    --gold1:#d8a33e;
    --gold2:#a66c12;
    --teal1:#18a7aa;
    --teal2:#0c7f83;
    --white1:#fbfbfb;
    --white2:#dfdfdf;
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at 50% 20%, #2b2f39 0%, #171b23 38%, #0b0d12 100%);
    color:#fff;
  }

  .screen{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
    padding:24px;
  }

  .title{
    margin:0;
    font-size:30px;
    line-height:1;
    font-weight:900;
    letter-spacing:.12em;
    text-transform:uppercase;
    text-align:center;
  }

  .subtitle{
    margin:0;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:rgba(255,255,255,.68);
    font-weight:700;
  }

  .wheel-stage{
    position:relative;
    width:min(84vw, 74vh);
    height:min(84vw, 74vh);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .pointer{
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:22px solid transparent;
    border-right:22px solid transparent;
    border-top:56px solid #202020;
    filter:
      drop-shadow(0 5px 8px rgba(0,0,0,.45))
      drop-shadow(0 0 10px rgba(255,255,255,.12));
    z-index:60;
  }

  .pointer::after{
    content:"";
    position:absolute;
    left:50%;
    top:-48px;
    transform:translateX(-50%);
    width:14px;
    height:14px;
    border-radius:50%;
    background:radial-gradient(circle, #fff 0%, #fff5c8 45%, #c8b26a 100%);
    box-shadow:0 0 18px rgba(255,245,180,.9);
  }

  .pointer.tick{
    animation:tick 70ms ease-out;
  }

  @keyframes tick{
    0%{ transform:translateX(-50%) rotate(0deg); }
    50%{ transform:translateX(-50%) rotate(-9deg); }
    100%{ transform:translateX(-50%) rotate(0deg); }
  }

  .wheel{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
  }

  .outer-rim{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:
      radial-gradient(circle at 50% 45%, #4e525b 0%, #23272e 48%, #0c0d10 70%, #2d3139 100%);
    box-shadow:
      0 20px 60px rgba(0,0,0,.45),
      inset 0 0 0 2px rgba(255,255,255,.20),
      inset 0 0 0 10px rgba(0,0,0,.28);
  }

  .bolts{
    position:absolute;
    inset:1.7%;
    border-radius:50%;
    pointer-events:none;
    z-index:5;
  }

  .bolt{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:
      radial-gradient(circle at 35% 35%, #fff 0%, #ececec 38%, #777 100%);
    box-shadow:
      0 0 0 1px rgba(0,0,0,.4),
      0 1px 2px rgba(0,0,0,.5);
    transform:translate(-50%, -50%);
  }

  .wheel-rotator{
    position:absolute;
    inset:4.8%;
    border-radius:50%;
    overflow:hidden;
    will-change:transform;
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,.12),
      inset 0 0 35px rgba(0,0,0,.12);
  }

  .sector-lines,
  .labels-svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  .sector-lines line{
    stroke:rgba(0,0,0,.45);
    stroke-width:2.1;
  }

  .labels-svg text{
    font-weight:900;
    text-anchor:middle;
    dominant-baseline:middle;
    paint-order:stroke fill;
  }

  .center-cap{
    position:absolute;
    top:50%;
    left:50%;
    width:24%;
    aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    border-radius:50%;
    z-index:40;
    background:
      radial-gradient(circle at 35% 35%, #7f7f7f 0%, #222 32%, #060606 62%, #5a5a5a 100%);
    box-shadow:
      0 14px 30px rgba(0,0,0,.45),
      inset 0 0 0 2px rgba(255,255,255,.22),
      inset 0 0 24px rgba(255,255,255,.06);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .center-cap::before{
    content:"";
    position:absolute;
    inset:14%;
    border-radius:50%;
    background:
      conic-gradient(
        from 0deg,
        #0f0f0f 0deg,
        #5e5e5e 25deg,
        #111 55deg,
        #8d8d8d 95deg,
        #101010 145deg,
        #696969 205deg,
        #0a0a0a 260deg,
        #777 315deg,
        #101010 360deg
      );
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,.10),
      inset 0 0 24px rgba(255,255,255,.06);
  }

  .center-cap::after{
    content:"";
    position:absolute;
    inset:0;
    margin:auto;
    width:72%;
    height:72%;
    border-radius:50%;
    box-shadow:0 0 0 2px rgba(214,185,134,.9);
  }

  .spin-btn{
    position:absolute;
    inset:0;
    border:none;
    border-radius:50%;
    background:transparent;
    cursor:pointer;
    z-index:50;
  }

  .result{
    min-height:76px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:48px;
    font-weight:900;
    letter-spacing:.03em;
    text-shadow:0 5px 18px rgba(0,0,0,.35);
  }

  .controls{
    display:flex;
    gap:14px;
    align-items:center;
    justify-content:center;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:15px 28px;
    font-size:16px;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
    cursor:pointer;
  }

  .btn-spin{
    color:#141414;
    background:linear-gradient(135deg, #f6d07a, #d8a33e 65%, #9f6815);
    box-shadow:0 10px 25px rgba(214,163,62,.22);
  }

  .btn-reset{
    color:#fff;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14);
  }
</style>
</head>
<body>

<div class="screen">
  <h1 class="title">Ruleta de Premios</h1>
  <p class="subtitle">Expo 2026</p>

  <div class="wheel-stage">
    <div id="pointer" class="pointer"></div>

    <div class="wheel">
      <div class="outer-rim"></div>
      <div id="bolts" class="bolts"></div>

      <div id="wheelRotator" class="wheel-rotator">
        <svg id="sectorLines" class="sector-lines" viewBox="0 0 100 100"></svg>
        <svg id="labelsSvg" class="labels-svg" viewBox="0 0 100 100"></svg>
      </div>

      <div class="center-cap">
        <button id="spinBtnCenter" class="spin-btn" aria-label="Girar ruleta"></button>
      </div>
    </div>
  </div>

  <div id="resultBig" class="result"></div>

  <div class="controls">
    <button id="spinBtnMain" class="btn btn-spin">Girar ruleta</button>
    <button id="resetBtn" class="btn btn-reset">Reset</button>
  </div>
</div>

<script>
  const options = [
    "3%","PREMIO 2","8%","PREMIO 4",
    "3%","PREMIO 1","5%","3%",
    "PREMIO 3","PREMIO 2","10%","PREMIO 4",
    "3%","PREMIO 3","5%","3%"
  ];

  const step = 360 / options.length;
  const POINTER_TIP_ANGLE = 270;
  const EPS_DEG = 1e-6;
  const SPIN_DURATION = 5200;

  const wheelRotator = document.getElementById("wheelRotator");
  const labelsSvg = document.getElementById("labelsSvg");
  const sectorLines = document.getElementById("sectorLines");
  const bolts = document.getElementById("bolts");
  const pointer = document.getElementById("pointer");
  const resultBig = document.getElementById("resultBig");
  const spinBtnCenter = document.getElementById("spinBtnCenter");
  const spinBtnMain = document.getElementById("spinBtnMain");
  const resetBtn = document.getElementById("resetBtn");

  let currentRotation = 0;
  let spinning = false;
  let audioCtx;

  function ensureAudio(){
    audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }

  function playClick(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 1250;

    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.18, t + 0.0035);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.032);
  }

  function tickPointer(){
    pointer.classList.remove("tick");
    void pointer.offsetWidth;
    pointer.classList.add("tick");
  }

  function easeOutQuint(x){
    return 1 - Math.pow(1 - x, 5);
  }

  function normalize360(a){
    let x = a % 360;
    if (x < 0) x += 360;
    return x;
  }

  function indexUnderPointer(rotationDeg){
    const worldAngle = normalize360(POINTER_TIP_ANGLE - rotationDeg);
    const a = normalize360(worldAngle + EPS_DEG);
    return Math.floor(a / step);
  }

  function polarPoint(cx, cy, r, angleDeg){
    const rad = angleDeg * Math.PI / 180;
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  function drawBolts(){
    bolts.innerHTML = "";
    const total = 28;
    const cx = 50;
    const cy = 50;
    const r = 48.7;

    for(let i=0;i<total;i++){
      const ang = (360/total) * i - 90;
      const p = polarPoint(cx, cy, r, ang);

      const el = document.createElement("div");
      el.className = "bolt";
      el.style.left = p.x + "%";
      el.style.top = p.y + "%";
      bolts.appendChild(el);
    }
  }

  function sectorFill(i){
    const palette = [
      {fill:"url(#segBlack)"},
      {fill:"url(#segWhite)"},
      {fill:"url(#segTeal)"},
      {fill:"url(#segGold)"}
    ];
    return palette[i % palette.length].fill;
  }

  function createDefs(){
    const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");

    defs.innerHTML = `
      <linearGradient id="segBlack" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1c1c1c"/>
        <stop offset="100%" stop-color="#070707"/>
      </linearGradient>

      <linearGradient id="segWhite" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#dcdcdc"/>
      </linearGradient>

      <linearGradient id="segTeal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#23c4c7"/>
        <stop offset="100%" stop-color="#0d7f82"/>
      </linearGradient>

      <linearGradient id="segGold" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#efc76c"/>
        <stop offset="100%" stop-color="#a96b13"/>
      </linearGradient>
    `;
    return defs;
  }

  function drawWheelBackground(){
    const ns = "http://www.w3.org/2000/svg";
    const oldDefs = labelsSvg.querySelector("defs");
    if(oldDefs) oldDefs.remove();
    labelsSvg.prepend(createDefs());

    // sectores pintados usando paths
    const existing = labelsSvg.querySelectorAll(".sector-shape");
    existing.forEach(el => el.remove());

    const cx = 50, cy = 50, r = 50;
    for(let i=0;i<options.length;i++){
      const start = i * step - 90;
      const end = start + step;
      const p1 = polarPoint(cx, cy, r, start);
      const p2 = polarPoint(cx, cy, r, end);

      const path = document.createElementNS(ns, "path");
      path.setAttribute("class","sector-shape");
      path.setAttribute(
        "d",
        `M ${cx} ${cy} L ${p1.x.toFixed(4)} ${p1.y.toFixed(4)} A ${r} ${r} 0 0 1 ${p2.x.toFixed(4)} ${p2.y.toFixed(4)} Z`
      );
      path.setAttribute("fill", sectorFill(i));
      labelsSvg.insertBefore(path, labelsSvg.firstChild.nextSibling);
    }
  }

  function drawSectorLines(){
    sectorLines.innerHTML = "";
    const cx = 50, cy = 50, r = 50;

    for(let i=0;i<options.length;i++){
      const ang = i * step - 90;
      const p = polarPoint(cx, cy, r, ang);
      const line = document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1", cx);
      line.setAttribute("y1", cy);
      line.setAttribute("x2", p.x.toFixed(3));
      line.setAttribute("y2", p.y.toFixed(3));
      sectorLines.appendChild(line);
    }
  }

  function drawLabels(){
    labelsSvg.querySelectorAll("text,g.text-group").forEach(n => n.remove());

    const cx = 50;
    const cy = 50;
    const radius = 34.8;

    options.forEach((txt, i) => {
      const ang = i * step + step / 2 - 90;
      const p = polarPoint(cx, cy, radius, ang);

      const isPercent = txt.includes("%");
      const isPremio = txt.startsWith("PREMIO");

      if (isPercent) {
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", p.x.toFixed(3));
        t.setAttribute("y", p.y.toFixed(3));
        t.setAttribute("font-size", "7.8");
        t.setAttribute("transform", `rotate(${ang + 90} ${p.x.toFixed(3)} ${p.y.toFixed(3)})`);

        const darkFill = [0,2].includes(i % 4);
        t.setAttribute("fill", darkFill ? "#ffffff" : "#3c3c3c");
        t.setAttribute("stroke", darkFill ? "rgba(0,0,0,.42)" : "rgba(255,255,255,.18)");
        t.setAttribute("stroke-width", "1.3");

        t.textContent = txt;
        labelsSvg.appendChild(t);
        return;
      }

      if (isPremio) {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class","text-group");
        g.setAttribute("transform", `rotate(${ang + 90} ${p.x.toFixed(3)} ${p.y.toFixed(3)})`);

        const fill = (i % 4 === 0 || i % 4 === 2) ? "#ffffff" : "#fefefe";
        const stroke = "rgba(0,0,0,.32)";

        const line1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        line1.setAttribute("x", p.x.toFixed(3));
        line1.setAttribute("y", (p.y - 2.8).toFixed(3));
        line1.setAttribute("font-size", "3.6");
        line1.setAttribute("fill", fill);
        line1.setAttribute("stroke", stroke);
        line1.setAttribute("stroke-width", "1");
        line1.textContent = "PREMIO";

        const num = txt.replace("PREMIO ","").trim();
        const line2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        line2.setAttribute("x", p.x.toFixed(3));
        line2.setAttribute("y", (p.y + 3.4).toFixed(3));
        line2.setAttribute("font-size", "6.1");
        line2.setAttribute("fill", fill);
        line2.setAttribute("stroke", stroke);
        line2.setAttribute("stroke-width", "1");
        line2.textContent = num;

        g.appendChild(line1);
        g.appendChild(line2);
        labelsSvg.appendChild(g);
      }
    });
  }

  function spin(){
    if(spinning) return;

    spinning = true;
    spinBtnCenter.disabled = true;
    spinBtnMain.disabled = true;
    ensureAudio();
    resultBig.textContent = "";

    const targetIndex = Math.floor(Math.random() * options.length);
    const targetCenter = targetIndex * step + step / 2;
    const extraTurns = 6 + Math.random() * 2;
    const extra = 360 * extraTurns;
    const targetRotation = currentRotation + extra + (POINTER_TIP_ANGLE - targetCenter);

    const start = performance.now();
    const from = currentRotation;
    let lastIdx = indexUnderPointer(from);

    function frame(now){
      const p = Math.min(1, (now - start) / SPIN_DURATION);
      const e = easeOutQuint(p);
      const ang = from + (targetRotation - from) * e;

      wheelRotator.style.transform = `rotate(${ang}deg)`;

      const idx = indexUnderPointer(ang);
      if(idx !== lastIdx){
        lastIdx = idx;
        playClick();
        tickPointer();
      }

      if(p < 1){
        requestAnimationFrame(frame);
      } else {
        currentRotation = targetRotation;
        wheelRotator.style.transform = `rotate(${currentRotation}deg)`;

        const finalIdx = indexUnderPointer(currentRotation);
        const result = options[finalIdx];
        resultBig.textContent = `🎉 ${result}`;

        spinning = false;
        spinBtnCenter.disabled = false;
        spinBtnMain.disabled = false;
      }
    }

    requestAnimationFrame(frame);
  }

  function resetWheel(){
    if(spinning) return;
    currentRotation = 0;
    wheelRotator.style.transform = "rotate(0deg)";
    resultBig.textContent = "";
  }

  spinBtnCenter.addEventListener("click", spin);
  spinBtnMain.addEventListener("click", spin);
  resetBtn.addEventListener("click", resetWheel);

  drawBolts();
  drawWheelBackground();
  drawSectorLines();
  drawLabels();
</script>
</body>
</html>
