<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta de Premios</title>

<style>
  *{box-sizing:border-box}

  :root{
    --bg1:#09090b;
    --bg2:#15151b;
    --panel:rgba(255,255,255,.08);
    --panel-border:rgba(255,255,255,.12);
    --text:#ffffff;
    --muted:rgba(255,255,255,.72);
    --accent:#ffd166;
    --accent2:#06d6a0;
    --ring:#0d9488;
  }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at top, #20202a 0%, #111118 45%, #08080c 100%);
    color:var(--text);
  }

  .app{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:14px 12px 12px;
    gap:10px;
  }

  .title{
    font-size:clamp(18px, 4vw, 28px);
    font-weight:900;
    letter-spacing:.8px;
    text-transform:uppercase;
    text-align:center;
    margin:0;
  }

  .subtitle{
    margin:0;
    font-size:13px;
    color:var(--muted);
    text-align:center;
  }

  .wheel-area{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }

  .wheel-wrap{
    position:relative;
    width:min(78vw, 440px);
    height:min(78vw, 440px);
  }

  .pointer{
    position:absolute;
    top:-8px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:34px solid #fff;
    z-index:50;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.45));
    transform-origin:50% 100%;
  }

  .pointer.tick{
    animation:tick 70ms ease-out;
  }

  @keyframes tick{
    0%{ transform:translateX(-50%) rotate(0deg); }
    50%{ transform:translateX(-50%) rotate(-10deg); }
    100%{ transform:translateX(-50%) rotate(0deg); }
  }

  .wheel{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
  }

  .wheel-rotator{
    position:absolute;
    inset:0;
    border-radius:50%;
    overflow:hidden;
    border:10px solid var(--ring);
    box-shadow:
      0 12px 35px rgba(0,0,0,.45),
      inset 0 0 0 4px rgba(255,255,255,.10);
    will-change:transform;
    background:
      conic-gradient(
        #ef476f 0deg 22.5deg,
        #ffd166 22.5deg 45deg,
        #06d6a0 45deg 67.5deg,
        #118ab2 67.5deg 90deg,
        #8338ec 90deg 112.5deg,
        #fb5607 112.5deg 135deg,
        #ef476f 135deg 157.5deg,
        #ffd166 157.5deg 180deg,
        #06d6a0 180deg 202.5deg,
        #118ab2 202.5deg 225deg,
        #8338ec 225deg 247.5deg,
        #fb5607 247.5deg 270deg,
        #ef476f 270deg 292.5deg,
        #ffd166 292.5deg 315deg,
        #06d6a0 315deg 337.5deg,
        #118ab2 337.5deg 360deg
      );
  }

  .sector-lines,
  .labels-svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  .sector-lines line{
    stroke:rgba(0,0,0,.42);
    stroke-width:3.4;
  }

  .labels-svg text{
    fill:#fff8e8;
    stroke:rgba(0,0,0,.34);
    stroke-width:2px;
    paint-order:stroke fill;
    font-weight:900;
    letter-spacing:.2px;
  }

  .center-cap{
    position:absolute;
    top:50%;
    left:50%;
    width:34%;
    aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%, #ffffff 0%, #f7f7f7 45%, #dddddd 100%);
    border:10px solid var(--ring);
    box-shadow:
      0 8px 18px rgba(0,0,0,.35),
      inset 0 0 0 4px rgba(255,255,255,.35);
    z-index:20;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
  }

  .center-content{
    line-height:1.05;
    color:#171717;
  }

  .center-mini{
    font-size:11px;
    font-weight:800;
    color:#555;
    text-transform:uppercase;
    margin-bottom:4px;
  }

  .center-main{
    font-size:clamp(20px, 3.3vw, 30px);
    font-weight:900;
    color:#0f766e;
    text-transform:uppercase;
  }

  .center-sub{
    margin-top:4px;
    font-size:11px;
    font-weight:800;
    color:#c2410c;
    text-transform:uppercase;
  }

  .spin-btn{
    position:absolute;
    inset:0;
    border:none;
    background:transparent;
    border-radius:50%;
    cursor:pointer;
    z-index:30;
  }

  .spin-btn:disabled{
    cursor:not-allowed;
  }

  .result-big{
    min-height:32px;
    font-size:clamp(22px, 5vw, 34px);
    font-weight:900;
    text-align:center;
    text-shadow:0 3px 10px rgba(0,0,0,.4);
  }

  .actions{
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:10px 14px;
    font-weight:800;
    cursor:pointer;
    font-size:13px;
  }

  .btn-primary{
    background:linear-gradient(135deg, #ffd166, #f59e0b);
    color:#191919;
  }

  .btn-secondary{
    background:rgba(255,255,255,.08);
    color:#fff;
    border:1px solid rgba(255,255,255,.12);
  }

  .bottom-panel{
    width:min(94vw, 520px);
    flex:1 1 auto;
    min-height:0;
    overflow:auto;
    background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
    border:1px solid var(--panel-border);
    border-radius:18px;
    box-shadow:0 10px 26px rgba(0,0,0,.28);
    padding:12px;
  }

  .panel-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }

  .panel-title{
    margin:0;
    font-size:16px;
    font-weight:900;
    text-transform:uppercase;
  }

  .badge{
    font-size:12px;
    font-weight:800;
    padding:6px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    color:#fff;
    white-space:nowrap;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 7px;
    font-size:14px;
  }

  thead th{
    font-size:10px;
    text-transform:uppercase;
    opacity:.76;
    padding:0 10px;
  }

  tbody tr{
    background:rgba(255,255,255,.05);
  }

  td{
    padding:10px;
    vertical-align:middle;
  }

  td:last-child{
    text-align:right;
    font-weight:900;
  }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:rgba(255,255,255,.55);
    margin-top:6px;
  }

  @media (max-height: 760px){
    .wheel-wrap{
      width:min(64vw, 330px);
      height:min(64vw, 330px);
    }

    .result-big{
      font-size:clamp(18px, 4.4vw, 28px);
      min-height:24px;
    }

    .bottom-panel{
      padding:10px;
    }

    td{
      padding:8px 10px;
    }
  }
</style>
</head>
<body>

<div class="app">
  <h1 class="title">Ruleta de Premios</h1>
  <p class="subtitle">Tocá el centro o el botón para girar</p>

  <div class="wheel-area">
    <div class="wheel-wrap">
      <div id="pointer" class="pointer"></div>

      <div class="wheel">
        <div id="wheelRotator" class="wheel-rotator">
          <svg id="sectorLines" class="sector-lines" viewBox="0 0 100 100"></svg>
          <svg id="labelsSvg" class="labels-svg" viewBox="0 0 100 100"></svg>
        </div>

        <div class="center-cap">
          <div class="center-content">
            <div class="center-mini">Probá</div>
            <div class="center-main">Suerte</div>
            <div class="center-sub">Girar</div>
          </div>
          <button id="spinBtn" class="spin-btn" aria-label="Girar ruleta"></button>
        </div>
      </div>
    </div>

    <div id="resultBig" class="result-big"></div>

    <div class="actions">
      <button id="spinBtn2" class="btn btn-primary">Girar ruleta</button>
      <button id="resetBtn" class="btn btn-secondary">Reset</button>
    </div>
  </div>

  <div class="bottom-panel">
    <div class="panel-top">
      <h3 class="panel-title">Resultados</h3>
      <div id="totalSpins" class="badge">Total: 0</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Premio</th>
          <th style="text-align:right;">Veces</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>

    <div class="footer-note">Los resultados quedan guardados en este navegador.</div>
  </div>
</div>

<script>
  // 15 valores que pasaste + 1 adicional de 3% para completar 16 casilleros
  const options = [
    "3%","PREMIO 2","8%","PREMIO 4",
    "3%","PREMIO 1","5%","3%",
    "PREMIO 3","PREMIO 2","10%","PREMIO 4",
    "3%","PREMIO 3","5%","3%"
  ];

  const visibleOrder = ["3%","5%","8%","10%","PREMIO 1","PREMIO 2","PREMIO 3","PREMIO 4"];
  const step = 360 / options.length;
  const POINTER_TIP_ANGLE = 270;
  const EPS_DEG = 1e-6;
  const SPIN_DURATION = 5200;

  let counts = JSON.parse(localStorage.getItem("ruleta_premios_nueva")) || {};
  visibleOrder.forEach(k => {
    if (typeof counts[k] !== "number") counts[k] = 0;
  });

  const wheelRotator = document.getElementById("wheelRotator");
  const labelsSvg = document.getElementById("labelsSvg");
  const sectorLines = document.getElementById("sectorLines");
  const pointer = document.getElementById("pointer");
  const resultBig = document.getElementById("resultBig");
  const resultsDiv = document.getElementById("results");
  const totalSpinsEl = document.getElementById("totalSpins");
  const resetBtn = document.getElementById("resetBtn");
  const spinBtn = document.getElementById("spinBtn");
  const spinBtn2 = document.getElementById("spinBtn2");

  let currentRotation = 0;
  let spinning = false;

  let audioCtx;
  function ensureAudio(){
    audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }

  function playClick(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 1400;

    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.18, t + 0.004);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.035);
  }

  function tickPointer(){
    pointer.classList.remove("tick");
    void pointer.offsetWidth;
    pointer.classList.add("tick");
  }

  function easeOutQuint(x){
    return 1 - Math.pow(1 - x, 5);
  }

  function polarPoint(cx, cy, r, angleDeg){
    const rad = angleDeg * Math.PI / 180;
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  function drawSectorLines(){
    sectorLines.innerHTML = "";
    const cx = 50, cy = 50, r = 50;

    for(let i = 0; i < options.length; i++){
      const ang = i * step;
      const p = polarPoint(cx, cy, r, ang);

      const line = document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1", cx);
      line.setAttribute("y1", cy);
      line.setAttribute("x2", p.x.toFixed(3));
      line.setAttribute("y2", p.y.toFixed(3));
      sectorLines.appendChild(line);
    }
  }

  function drawLabels(){
    labelsSvg.innerHTML = "";

    const cx = 50;
    const cy = 50;
    const radius = 38;

    options.forEach((txt, i) => {
      const ang = i * step + step / 2;
      const p = polarPoint(cx, cy, radius, ang);

      const t = document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x", p.x.toFixed(3));
      t.setAttribute("y", p.y.toFixed(3));
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("dominant-baseline", "middle");
      t.setAttribute("transform", `rotate(${ang + 90} ${p.x.toFixed(3)} ${p.y.toFixed(3)})`);

      const isPercent = txt.includes("%");
      t.setAttribute("font-size", isPercent ? "7.2" : "4.6");
      t.textContent = txt;

      labelsSvg.appendChild(t);
    });
  }

  function renderResults(){
    const total = Object.values(counts).reduce((a,b) => a + (Number(b) || 0), 0);
    resultsDiv.innerHTML = "";

    visibleOrder.forEach(k => {
      const c = Number(counts[k] || 0);
      resultsDiv.innerHTML += `
        <tr>
          <td>${k}</td>
          <td>${c}</td>
        </tr>
      `;
    });

    totalSpinsEl.textContent = `Total: ${total}`;
  }

  function normalize360(a){
    let x = a % 360;
    if(x < 0) x += 360;
    return x;
  }

  function indexUnderPointer(rotationDeg){
    const worldAngle = normalize360(POINTER_TIP_ANGLE - rotationDeg);
    const a = normalize360(worldAngle + EPS_DEG);
    return Math.floor(a / step);
  }

  function spin(){
    if(spinning) return;

    spinning = true;
    spinBtn.disabled = true;
    spinBtn2.disabled = true;
    ensureAudio();
    resultBig.textContent = "";

    const targetIndex = Math.floor(Math.random() * options.length);
    const targetCenter = targetIndex * step + step / 2;
    const extraTurns = 6 + Math.random() * 2;
    const extra = 360 * extraTurns;
    const targetRotation = currentRotation + extra + (POINTER_TIP_ANGLE - targetCenter);

    const start = performance.now();
    const from = currentRotation;
    let lastIdx = indexUnderPointer(from);

    function frame(now){
      const p = Math.min(1, (now - start) / SPIN_DURATION);
      const e = easeOutQuint(p);
      const ang = from + (targetRotation - from) * e;

      wheelRotator.style.transform = `rotate(${ang}deg)`;

      const idx = indexUnderPointer(ang);
      if(idx !== lastIdx){
        lastIdx = idx;
        playClick();
        tickPointer();
      }

      if(p < 1){
        requestAnimationFrame(frame);
      } else {
        currentRotation = targetRotation;
        wheelRotator.style.transform = `rotate(${currentRotation}deg)`;

        const finalIdx = indexUnderPointer(currentRotation);
        const result = options[finalIdx];

        counts[result] = (Number(counts[result]) || 0) + 1;
        localStorage.setItem("ruleta_premios_nueva", JSON.stringify(counts));

        renderResults();
        resultBig.textContent = `🎉 Ganaste ${result}`;
        spinning = false;
        spinBtn.disabled = false;
        spinBtn2.disabled = false;
      }
    }

    requestAnimationFrame(frame);
  }

  spinBtn.addEventListener("click", spin);
  spinBtn2.addEventListener("click", spin);

  resetBtn.addEventListener("click", () => {
    if(spinning) return;

    const next = {};
    visibleOrder.forEach(k => next[k] = 0);
    counts = next;
    localStorage.setItem("ruleta_premios_nueva", JSON.stringify(counts));
    resultBig.textContent = "";
    renderResults();
  });

  drawSectorLines();
  drawLabels();
  renderResults();
</script>
</body>
</html>
